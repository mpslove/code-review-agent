name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -r requirements.txt

    - name: Run tests with coverage
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        LLM_MODEL: deepseek-chat
      run: |
        python -m pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

    - name: Run self-review (static analysis only, no LLM)
      run: |
        python -m src.main --mode static --path src/ --output self-review-report.md || true

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

    - name: Upload self-review report
      uses: actions/upload-artifact@v4
      with:
        name: self-review-report
        path: self-review-report.md
